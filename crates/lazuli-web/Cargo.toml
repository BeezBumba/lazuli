[package]
name = "lazuli-web"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Browser WebAssembly frontend for the Lazuli GameCube emulator"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ppcwasm = { workspace = true }
gekko = { workspace = true }
wasm-bindgen = "0.2"
js-sys = "0.3"

[dependencies.web-sys]
version = "0.3"
features = [
    "console",
    "Window",
    "Performance",
]

[lints]
workspace = true
